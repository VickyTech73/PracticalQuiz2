// ─── INLINE ORBIT CONTROLS ────────────────────────────────────────────────────
// Minimal but full-featured OrbitControls (rotate, pan, zoom)
class OrbitControls {
  constructor(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.target = new THREE.Vector3(0, 2, -4);
    this.minDistance = 3;
    this.maxDistance = 120;
    this.minPolarAngle = 0.05;
    this.maxPolarAngle = Math.PI / 2 - 0.02;
    this.enableDamping = true;
    this.dampingFactor = 0.08;
    this.zoomSpeed = 1.0;
    this.rotateSpeed = 0.6;
    this.panSpeed = 0.8;

    this._spherical = new THREE.Spherical();
    this._sphericalDelta = new THREE.Spherical();
    this._panOffset = new THREE.Vector3();
    this._scale = 1;
    this._state = 'none'; // none | rotate | pan

    this._mouse = { x: 0, y: 0 };

    // init spherical from current camera pos
    const offset = new THREE.Vector3().subVectors(camera.position, this.target);
    this._spherical.setFromVector3(offset);

    domElement.addEventListener('mousedown', e => this._onMouseDown(e));
    domElement.addEventListener('mousemove', e => this._onMouseMove(e));
    domElement.addEventListener('mouseup', () => this._state = 'none');
    domElement.addEventListener('wheel', e => this._onWheel(e), { passive: false });
    domElement.addEventListener('contextmenu', e => e.preventDefault());
    // touch
    domElement.addEventListener('touchstart', e => this._onTouchStart(e), { passive: false });
    domElement.addEventListener('touchmove', e => this._onTouchMove(e), { passive: false });
    domElement.addEventListener('touchend', () => { this._state = 'none'; this._touches = null; });
    this._touches = null;
  }

  _onMouseDown(e) {
    e.preventDefault();
    this._mouse = { x: e.clientX, y: e.clientY };
    if (e.button === 0) this._state = 'rotate';
    else if (e.button === 1 || e.button === 2) this._state = 'pan';
  }

  _onMouseMove(e) {
    if (this._state === 'none') return;
    const dx = e.clientX - this._mouse.x;
    const dy = e.clientY - this._mouse.y;
    this._mouse = { x: e.clientX, y: e.clientY };
    if (this._state === 'rotate') {
      this._sphericalDelta.theta -= (2 * Math.PI * dx / this.domElement.clientWidth) * this.rotateSpeed;
      this._sphericalDelta.phi   -= (2 * Math.PI * dy / this.domElement.clientHeight) * this.rotateSpeed;
    } else if (this._state === 'pan') {
      this._pan(dx, dy);
    }
  }

  _onWheel(e) {
    e.preventDefault();
    if (e.deltaY < 0) this._scale /= Math.pow(0.95, this.zoomSpeed);
    else this._scale *= Math.pow(0.95, this.zoomSpeed);
  }

  _onTouchStart(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      this._state = 'rotate';
      this._touches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
    } else if (e.touches.length === 2) {
      this._state = 'pinch';
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      this._pinchDist = Math.sqrt(dx*dx + dy*dy);
    }
  }

  _onTouchMove(e) {
    e.preventDefault();
    if (this._state === 'rotate' && e.touches.length === 1 && this._touches) {
      const dx = e.touches[0].clientX - this._touches[0].x;
      const dy = e.touches[0].clientY - this._touches[0].y;
      this._sphericalDelta.theta -= (2 * Math.PI * dx / this.domElement.clientWidth) * this.rotateSpeed;
      this._sphericalDelta.phi   -= (2 * Math.PI * dy / this.domElement.clientHeight) * this.rotateSpeed;
      this._touches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
    } else if (this._state === 'pinch' && e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      this._scale *= this._pinchDist / dist;
      this._pinchDist = dist;
    }
  }

  _pan(dx, dy) {
    const el = this.domElement;
    const offset = new THREE.Vector3().subVectors(this.camera.position, this.target);
    let targetDist = offset.length();
    targetDist *= Math.tan((this.camera.fov / 2) * Math.PI / 180);

    const right = new THREE.Vector3();
    const up = new THREE.Vector3();
    right.setFromMatrixColumn(this.camera.matrix, 0);
    up.setFromMatrixColumn(this.camera.matrix, 1);

    right.multiplyScalar(-(2 * dx * targetDist / el.clientHeight) * this.panSpeed);
    up.multiplyScalar((2 * dy * targetDist / el.clientHeight) * this.panSpeed);
    this._panOffset.add(right).add(up);
  }

  update() {
    const offset = new THREE.Vector3().subVectors(this.camera.position, this.target);
    this._spherical.setFromVector3(offset);

    if (this.enableDamping) {
      this._spherical.theta += this._sphericalDelta.theta * this.dampingFactor;
      this._spherical.phi   += this._sphericalDelta.phi   * this.dampingFactor;
      this._sphericalDelta.theta *= (1 - this.dampingFactor);
      this._sphericalDelta.phi   *= (1 - this.dampingFactor);
    } else {
      this._spherical.theta += this._sphericalDelta.theta;
      this._spherical.phi   += this._sphericalDelta.phi;
      this._sphericalDelta.set(0, 0, 0);
    }

    this._spherical.phi = Math.max(this.minPolarAngle, Math.min(this.maxPolarAngle, this._spherical.phi));
    this._spherical.radius *= this._scale;
    this._spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this._spherical.radius));
    this._scale = 1;

    this.target.add(this._panOffset.clone().multiplyScalar(this.enableDamping ? this.dampingFactor : 1));
    this._panOffset.multiplyScalar(this.enableDamping ? 1 - this.dampingFactor : 0);

    offset.setFromSpherical(this._spherical);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
  }
}
// ─── SCENE SETUP ──────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ─── CAMERA ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 500);
camera.position.set(0, 3.5, 22);
camera.lookAt(0, 2, 0);

// ─── SKY GRADIENT ─────────────────────────────────────────────────────────────
const skyGeo = new THREE.SphereGeometry(200, 16, 8);
skyGeo.scale(-1, 1, 1);
const skyMat = new THREE.ShaderMaterial({
  uniforms: { topColor: { value: new THREE.Color(0x1565c0) }, bottomColor: { value: new THREE.Color(0x42a5f5) } },
  vertexShader: `varying float vY; void main(){ vY = position.y; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying float vY;
    void main(){ float t = clamp((vY+100.0)/200.0,0.0,1.0); gl_FragColor = vec4(mix(bottomColor,topColor,t),1.0); }`,
  side: THREE.BackSide
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ─── SUN ──────────────────────────────────────────────────────────────────────
const sunGeo = new THREE.CircleGeometry(6, 8);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff176 });
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.position.set(60, 80, -120);
scene.add(sun);
// sun glow ring
const glowGeo = new THREE.CircleGeometry(8, 8);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xfffde7, transparent: true, opacity: 0.35 });
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.position.set(60, 80, -121);
scene.add(glow);

// ─── LIGHTING ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xfff9e6, 0.7);
scene.add(ambient);

const sun_light = new THREE.DirectionalLight(0xfffde7, 1.2);
sun_light.position.set(30, 60, 20);
sun_light.castShadow = true;
sun_light.shadow.mapSize.width = 2048;
sun_light.shadow.mapSize.height = 2048;
sun_light.shadow.camera.near = 0.5;
sun_light.shadow.camera.far = 200;
sun_light.shadow.camera.left = -50;
sun_light.shadow.camera.right = 50;
sun_light.shadow.camera.top = 50;
sun_light.shadow.camera.bottom = -50;
scene.add(sun_light);

const fillLight = new THREE.DirectionalLight(0xb3e5fc, 0.4);
fillLight.position.set(-20, 10, 10);
scene.add(fillLight);

// ─── TERRAIN ──────────────────────────────────────────────────────────────────
function makeTerrain() {
  const geo = new THREE.CircleGeometry(80, 32);
  // randomize vertices for low-poly look
  const pos = geo.attributes.position;
  for (let i = 1; i < pos.count; i++) {
    pos.setY(i, (Math.random() - 0.5) * 0.6);
    pos.setZ(i, pos.getZ(i) + (Math.random() - 0.5) * 0.5);
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({ color: 0x5cb85c, flatShading: true });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.receiveShadow = true;
  return mesh;
}
scene.add(makeTerrain());

// ─── PATHWAY ──────────────────────────────────────────────────────────────────
function makePath() {
  const group = new THREE.Group();
  const slabMat = new THREE.MeshLambertMaterial({ color: 0xd7ccc8, flatShading: true });
  for (let i = 0; i < 14; i++) {
    const w = 1.8 + Math.random() * 0.2;
    const d = 1.0 + Math.random() * 0.15;
    const geo = new THREE.BoxGeometry(w, 0.08, d);
    const mesh = new THREE.Mesh(geo, slabMat);
    mesh.position.set((Math.random() - 0.5) * 0.15, 0.04, 20 - i * 2.8);
    mesh.rotation.y = (Math.random() - 0.5) * 0.08;
    mesh.receiveShadow = true;
    mesh.castShadow = true;
    group.add(mesh);
  }
  return group;
}
scene.add(makePath());

// ─── PAVILION ─────────────────────────────────────────────────────────────────
function makePavilion() {
  const group = new THREE.Group();

  // base platform
  const baseMat = new THREE.MeshLambertMaterial({ color: 0xf5f5f5, flatShading: true });
  const baseGeo = new THREE.CylinderGeometry(4.2, 4.5, 0.4, 12);
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.2;
  base.receiveShadow = true;
  base.castShadow = true;
  group.add(base);

  // roof
  const roofMat = new THREE.MeshLambertMaterial({ color: 0x388e3c, flatShading: true });
  const roofGeo = new THREE.CylinderGeometry(0.3, 4.8, 2.2, 6);
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = 4.5;
  roof.castShadow = true;
  group.add(roof);

  // roof cap
  const capGeo = new THREE.ConeGeometry(0.6, 0.7, 6);
  const cap = new THREE.Mesh(capGeo, new THREE.MeshLambertMaterial({ color: 0x2e7d32, flatShading: true }));
  cap.position.y = 5.8;
  group.add(cap);

  // pillars
  const pillarMat = new THREE.MeshLambertMaterial({ color: 0xfafafa, flatShading: true });
  const pillarCount = 6;
  for (let i = 0; i < pillarCount; i++) {
    const angle = (i / pillarCount) * Math.PI * 2;
    const geo = new THREE.CylinderGeometry(0.18, 0.18, 3.8, 6);
    const pillar = new THREE.Mesh(geo, pillarMat);
    pillar.position.set(Math.cos(angle) * 3.7, 2.1, Math.sin(angle) * 3.7);
    pillar.castShadow = true;
    group.add(pillar);
  }

  group.position.set(0, 0, -6);
  return group;
}
scene.add(makePavilion());

// ─── CURVED WALLS ─────────────────────────────────────────────────────────────
function makeCurvedWall(side) {
  const group = new THREE.Group();
  const wallMat = new THREE.MeshLambertMaterial({ color: 0x4caf50, flatShading: true, side: THREE.DoubleSide });
  const segments = 10;
  const radius = 8;
  const height = 8;

  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const angle = t * (Math.PI * 0.6) - Math.PI * 0.3;
    shape.lineTo(Math.sin(angle) * radius, t * height);
  }
  shape.lineTo(0, height);
  shape.lineTo(0, 0);

  const extrudeSettings = { depth: 0.5, bevelEnabled: false };
  const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  const wall = new THREE.Mesh(geo, wallMat);
  wall.castShadow = true;
  wall.receiveShadow = true;
  group.add(wall);

  group.position.set(side * 12, 0, 16);
  group.rotation.y = side * -0.3;
  return group;
}
scene.add(makeCurvedWall(-1));
scene.add(makeCurvedWall(1));

// ─── TABLE & CHAIRS ───────────────────────────────────────────────────────────
function makeTable() {
  const group = new THREE.Group();
  const woodMat = new THREE.MeshLambertMaterial({ color: 0xd7a26c, flatShading: true });
  const metalMat = new THREE.MeshLambertMaterial({ color: 0xe8e8e8, flatShading: true });

  // tabletop
  const topGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.12, 10);
  const top = new THREE.Mesh(topGeo, woodMat);
  top.position.y = 1.1;
  top.castShadow = true;
  group.add(top);

  // table leg
  const legGeo = new THREE.CylinderGeometry(0.1, 0.15, 1.1, 6);
  const leg = new THREE.Mesh(legGeo, metalMat);
  leg.position.y = 0.55;
  group.add(leg);

  // chair maker
  function makeChair(x, z, ry) {
    const cg = new THREE.Group();
    const seatGeo = new THREE.BoxGeometry(0.8, 0.1, 0.8);
    const seat = new THREE.Mesh(seatGeo, new THREE.MeshLambertMaterial({ color: 0xffffff, flatShading: true }));
    seat.position.y = 0.55;
    cg.add(seat);

    const backGeo = new THREE.BoxGeometry(0.8, 0.7, 0.08);
    const back = new THREE.Mesh(backGeo, new THREE.MeshLambertMaterial({ color: 0xffffff, flatShading: true }));
    back.position.set(0, 0.95, -0.36);
    cg.add(back);

    // legs
    for (let lx of [-0.3, 0.3]) for (let lz of [-0.3, 0.3]) {
      const clg = new THREE.CylinderGeometry(0.04, 0.04, 0.55, 4);
      const cl = new THREE.Mesh(clg, new THREE.MeshLambertMaterial({ color: 0xe0e0e0, flatShading: true }));
      cl.position.set(lx, 0.27, lz);
      cg.add(cl);
    }

    cg.position.set(x, 0, z);
    cg.rotation.y = ry;
    cg.castShadow = true;
    return cg;
  }
  group.add(makeChair(1.9, 0, Math.PI / 2));
  group.add(makeChair(-1.9, 0, -Math.PI / 2));
  group.add(makeChair(0, 1.9, Math.PI));

  return group;
}

// ─── TABLE ITEMS ──────────────────────────────────────────────────────────────
function makeTableItems(tableGroup) {
  // Milo tin
  const miloGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.45, 10);
  const miloMat = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
  const milo = new THREE.Mesh(miloGeo, miloMat);
  milo.position.set(-0.4, 1.39, -0.1);
  // milo label band
  const bandGeo = new THREE.CylinderGeometry(0.185, 0.185, 0.2, 10);
  const bandMat = new THREE.MeshLambertMaterial({ color: 0xf9a825 });
  const band = new THREE.Mesh(bandGeo, bandMat);
  band.position.set(-0.4, 1.39, -0.1);
  tableGroup.add(milo);
  tableGroup.add(band);

  // Milk tin
  const milkGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.38, 10);
  const milkMat = new THREE.MeshLambertMaterial({ color: 0xfff8e1 });
  const milk = new THREE.Mesh(milkGeo, milkMat);
  milk.position.set(0.35, 1.36, 0.1);
  const milkBandGeo = new THREE.CylinderGeometry(0.155, 0.155, 0.15, 10);
  const milkBand = new THREE.Mesh(milkBandGeo, new THREE.MeshLambertMaterial({ color: 0xef9a9a }));
  milkBand.position.set(0.35, 1.36, 0.1);
  tableGroup.add(milk);
  tableGroup.add(milkBand);

  // cups
  function makeCup(x, z) {
    const cupGeo = new THREE.CylinderGeometry(0.1, 0.08, 0.22, 8);
    const cup = new THREE.Mesh(cupGeo, new THREE.MeshLambertMaterial({ color: 0xfafafa, flatShading: true }));
    cup.position.set(x, 1.32, z);
    tableGroup.add(cup);
    // cup base ring
    const ringGeo = new THREE.TorusGeometry(0.09, 0.015, 4, 8);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshLambertMaterial({ color: 0xe0e0e0 }));
    ring.position.set(x, 1.215, z);
    ring.rotation.x = Math.PI / 2;
    tableGroup.add(ring);
  }
  makeCup(-0.1, -0.45);
  makeCup(0.5, -0.35);
}

const tableGroup = makeTable();
tableGroup.position.set(3.5, 0, -3);
makeTableItems(tableGroup);
scene.add(tableGroup);

// ─── TREES ────────────────────────────────────────────────────────────────────
function makeTree(x, z, scale = 1) {
  const group = new THREE.Group();
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x795548, flatShading: true });
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x33691e, flatShading: true });
  const leafMat2 = new THREE.MeshLambertMaterial({ color: 0x558b2f, flatShading: true });

  const trunkGeo = new THREE.CylinderGeometry(0.22, 0.3, 2.2, 6);
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 1.1;
  trunk.castShadow = true;
  group.add(trunk);

  // layered foliage cones
  const layers = [
    { r: 2.2, h: 2.4, y: 3.2, mat: leafMat },
    { r: 1.7, h: 2.0, y: 4.5, mat: leafMat2 },
    { r: 1.1, h: 1.6, y: 5.6, mat: leafMat },
  ];
  layers.forEach(l => {
    const geo = new THREE.ConeGeometry(l.r, l.h, 7);
    const mesh = new THREE.Mesh(geo, l.mat);
    mesh.position.y = l.y;
    mesh.castShadow = true;
    group.add(mesh);
  });

  group.scale.setScalar(scale);
  group.position.set(x, 0, z);
  return group;
}
scene.add(makeTree(-8, -14, 1.1));
scene.add(makeTree(9, -16, 1.3));
scene.add(makeTree(-14, -8, 0.9));

// ─── FLOWERS ──────────────────────────────────────────────────────────────────
const flowerColors = [0xff80ab, 0xffee58, 0xff7043, 0xce93d8, 0x80cbc4];
function makeFlower(x, z) {
  const group = new THREE.Group();
  const stemGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.35, 4);
  const stem = new THREE.Mesh(stemGeo, new THREE.MeshLambertMaterial({ color: 0x66bb6a }));
  stem.position.y = 0.175;
  group.add(stem);

  const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
  const petalGeo = new THREE.SphereGeometry(0.12, 5, 4);
  const petal = new THREE.Mesh(petalGeo, new THREE.MeshLambertMaterial({ color, flatShading: true }));
  petal.position.y = 0.38;
  group.add(petal);

  group.position.set(x, 0, z);
  return group;
}

const flowerPositions = [
  [-5, 5], [5, 8], [-8, 2], [7, -2], [-3, 12], [4, 13], [-6, -4],
  [10, 5], [-12, 3], [8, 10], [-4, -8], [12, -5], [2, 18], [-9, 15],
  [6, -10], [-15, -3], [14, 2], [3, -15], [-2, -12], [11, -12]
];
flowerPositions.forEach(([x, z]) => scene.add(makeFlower(x + (Math.random()-0.5), z + (Math.random()-0.5))));

// ─── CLOUDS ───────────────────────────────────────────────────────────────────
const clouds = [];
function makeCloud(x, y, z) {
  const group = new THREE.Group();
  const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, flatShading: true, transparent: true, opacity: 0.92 });
  const bumps = [
    [0, 0, 0, 2.5], [-2.5, -0.4, 0, 1.8], [2.5, -0.5, 0, 1.9],
    [-1.2, 0.8, 0.3, 1.4], [1.2, 0.9, -0.2, 1.5]
  ];
  bumps.forEach(([bx, by, bz, r]) => {
    const geo = new THREE.DodecahedronGeometry(r, 0);
    const mesh = new THREE.Mesh(geo, cloudMat);
    mesh.position.set(bx, by, bz);
    group.add(mesh);
  });
  group.position.set(x, y, z);
  clouds.push(group);
  return group;
}
scene.add(makeCloud(-30, 40, -80));
scene.add(makeCloud(20, 50, -100));
scene.add(makeCloud(55, 35, -70));
scene.add(makeCloud(-60, 45, -60));

// ─── BIRDS ────────────────────────────────────────────────────────────────────
const birds = [];
function makeBird(x, y, z) {
  const group = new THREE.Group();
  const bMat = new THREE.MeshBasicMaterial({ color: 0x37474f });
  // two wing quads using triangle shapes
  const wShape = new THREE.Shape();
  wShape.moveTo(0, 0); wShape.lineTo(1.2, 0.4); wShape.lineTo(0.6, 0);
  const wGeo = new THREE.ShapeGeometry(wShape);
  const lWing = new THREE.Mesh(wGeo, bMat);
  const rWing = new THREE.Mesh(wGeo, bMat);
  rWing.scale.x = -1;
  group.add(lWing); group.add(rWing);
  group.position.set(x, y, z);
  group.userData = { baseY: y, t: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.2 };
  birds.push(group);
  return group;
}
for (let i = 0; i < 8; i++) {
  scene.add(makeBird(
    (Math.random() - 0.5) * 80,
    30 + Math.random() * 20,
    -40 - Math.random() * 60
  ));
}

// ─── GRASS WAVE (vertex animation) ────────────────────────────────────────────
// We'll simulate with small grass blades
const grassBlades = [];
function makeGrassBlade(x, z) {
  const geo = new THREE.PlaneGeometry(0.08, 0.35, 1, 3);
  const mat = new THREE.MeshLambertMaterial({ color: 0x7cb342, side: THREE.DoubleSide });
  const blade = new THREE.Mesh(geo, mat);
  blade.position.set(x, 0.17, z);
  blade.rotation.y = Math.random() * Math.PI;
  blade.userData = { t: Math.random() * Math.PI * 2 };
  grassBlades.push(blade);
  return blade;
}
// Scatter grass around
for (let i = 0; i < 200; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 2 + Math.random() * 22;
  scene.add(makeGrassBlade(Math.cos(angle) * r, Math.sin(angle) * r));
}

// ─── BUTTERFLIES ──────────────────────────────────────────────────────────────
const butterflies = [];
const bflyColors = [0xfce4ec, 0xe8f5e9, 0xfff9c4, 0xe3f2fd];
function makeButterfly(x, y, z) {
  const group = new THREE.Group();
  const col = bflyColors[Math.floor(Math.random() * bflyColors.length)];
  const wMat = new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
  const wing = new THREE.CircleGeometry(0.3, 5);
  const lW = new THREE.Mesh(wing, wMat); lW.position.x = 0.15;
  const rW = new THREE.Mesh(wing, wMat); rW.position.x = -0.15; rW.scale.x = -1;
  group.add(lW); group.add(rW);
  group.position.set(x, y, z);
  group.userData = { t: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 0.5, radius: 1 + Math.random() * 2 };
  butterflies.push(group);
  return group;
}
for (let i = 0; i < 6; i++) {
  scene.add(makeButterfly(
    (Math.random() - 0.5) * 16,
    1.5 + Math.random() * 2,
    (Math.random() - 0.5) * 12
  ));
}

// ─── FOG ──────────────────────────────────────────────────────────────────────
scene.fog = new THREE.FogExp2(0x42a5f5, 0.006);

// ─── ORBIT CONTROLS ───────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, -4);

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // drift clouds
  clouds.forEach((c, i) => {
    c.position.x += 0.008 * (i % 2 === 0 ? 1 : -1);
    if (c.position.x > 100) c.position.x = -100;
    if (c.position.x < -100) c.position.x = 100;
  });

  // animate birds
  birds.forEach(b => {
    b.userData.t += 0.02;
    b.position.x += b.userData.speed * 0.07;
    if (b.position.x > 80) b.position.x = -80;
    b.position.y = b.userData.baseY + Math.sin(b.userData.t * 2) * 0.8;
    // wing flap
    b.children[0].rotation.x = Math.sin(t * 5) * 0.4;
    b.children[1].rotation.x = -Math.sin(t * 5) * 0.4;
  });

  // wave grass
  grassBlades.forEach(blade => {
    blade.rotation.z = Math.sin(t * 1.5 + blade.userData.t) * 0.15;
  });

  // butterflies fluttering
  butterflies.forEach(bf => {
    bf.userData.t += 0.02;
    const angle = bf.userData.t;
    const cx = bf.userData.cx || (bf.userData.cx = bf.position.x);
    const cz = bf.userData.cz || (bf.userData.cz = bf.position.z);
    bf.position.x = cx + Math.cos(angle) * bf.userData.radius;
    bf.position.z = cz + Math.sin(angle * 0.7) * bf.userData.radius;
    bf.position.y += Math.sin(t * 3 + bf.userData.t) * 0.005;
    // wing flap
    bf.children[0].rotation.y = Math.sin(t * 8) * 0.6;
    bf.children[1].rotation.y = -Math.sin(t * 8) * 0.6;
  });

  // update orbit controls (replaces camera sway)
  controls.update();

  renderer.render(scene, camera);
}

animate();

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
